version: "3.9"

services:

  db:

    image: postgres:16

    container_name: gultie-postgres

    restart: always

    environment:
      POSTGRES_DB: gultie_code_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build:
      context: ./gultie-code-backend

    container_name: gultie-backend

    ports:
      - "8000:8000"

    env_file:
      - ./gultie-code-backend/.env

    depends_on:
      - db

    volumes:
      - ./gultie-code-backend:/app

  frontend:

    build:
      context: ./gultie-code

    container_name: gultie-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./gultie-code:/app
      - /app/node_modules

volumes:

  postgres_data: